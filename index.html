<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiragana Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════
       SCREEN 1 — MENU
  ══════════════════════════ -->
  <div class="screen" id="screen-menu">

    <div class="menu-hero">
      <div class="hero-kana">あいうえお</div>
      <h1 class="hero-title">Learn Hiragana</h1>
      <p class="hero-sub">Configure your practice below, then start when you're ready.</p>

      <!-- Inline Settings Panel -->
      <div class="menu-settings">

        <div class="settings-section-label">Practice Mode</div>
        <div class="mode-selector">
          <button class="mode-btn active" id="mode-btn-typing" onclick="setMode('typing')">
            <div class="mode-icon">Aa</div>
            <div class="mode-label">Typing</div>
            <div class="mode-desc">Type the romaji</div>
          </button>
          <button class="mode-btn" id="mode-btn-choice" onclick="setMode('choice')">
            <div class="mode-icon">⊙</div>
            <div class="mode-label">Multiple Choice</div>
            <div class="mode-desc">Pick the answer</div>
          </button>
        </div>

        <div class="settings-section-label" style="margin-top:22px">Kana Selection</div>
        <div class="settings-options">

          <label class="setting-item">
            <div class="setting-check-wrap">
              <input type="checkbox" id="cfg-basic" checked onchange="applySettings()">
              <span class="custom-check"></span>
            </div>
            <div class="setting-info">
              <span class="setting-name">Basic Hiragana</span>
              <span class="setting-preview">あ い う え お … ん</span>
            </div>
          </label>

          <label class="setting-item">
            <div class="setting-check-wrap">
              <input type="checkbox" id="cfg-dakuten" onchange="applySettings()">
              <span class="custom-check"></span>
            </div>
            <div class="setting-info">
              <span class="setting-name">Dakuten <span class="badge-kana">゙</span></span>
              <span class="setting-preview">が ざ だ ば …</span>
            </div>
          </label>

          <label class="setting-item">
            <div class="setting-check-wrap">
              <input type="checkbox" id="cfg-handakuten" onchange="applySettings()">
              <span class="custom-check"></span>
            </div>
            <div class="setting-info">
              <span class="setting-name">Handakuten <span class="badge-kana">゚</span></span>
              <span class="setting-preview">ぱ ぴ ぷ ぺ ぽ</span>
            </div>
          </label>

          <label class="setting-item">
            <div class="setting-check-wrap">
              <input type="checkbox" id="cfg-combination" onchange="applySettings()">
              <span class="custom-check"></span>
            </div>
            <div class="setting-info">
              <span class="setting-name">Combination (Yōon)</span>
              <span class="setting-preview">きゃ しゅ ちょ …</span>
            </div>
          </label>

        </div>
        <div class="settings-pool-info" id="settings-pool-info">46 characters in practice pool</div>
      </div>
      <!-- End Settings Panel -->

      <button class="btn-start" onclick="startPractice()">Start Practice →</button>
    </div>

    <div class="chart-section">
      <div class="chart-label">Hiragana Chart — click to expand</div>

      <div class="chart-tabs">
        <button class="chart-tab active" onclick="switchChartTab(this,'basic')">Basic</button>
        <button class="chart-tab" onclick="switchChartTab(this,'dakuten')">Dakuten ゙</button>
        <button class="chart-tab" onclick="switchChartTab(this,'handakuten')">Handakuten ゚</button>
        <button class="chart-tab" onclick="switchChartTab(this,'combination')">Combination</button>
      </div>

      <div id="chart-rows"></div>
    </div>

  </div>

  <!-- ══════════════════════════
       SCREEN 2 — PRACTICE
  ══════════════════════════ -->
  <div class="screen hidden" id="screen-practice">

    <div class="top-bar">
      <button class="btn-back" onclick="goToMenu()">← Menu</button>
      <div class="mode-pill" id="mode-pill">Typing</div>
    </div>

    <div class="practice-body">
      <div class="card">
        <div class="row-badge" id="row-badge">vowels</div>

        <div class="char-wrapper" id="char-wrapper">
          <div class="char-ring"></div>
          <div class="char-ring-outer"></div>
          <span id="character">あ</span>
        </div>

        <div class="romaji-hint" id="romaji-hint"></div>

        <!-- ── Typing Mode UI ── -->
        <div id="typing-ui">
          <div class="input-row">
            <input
              type="text" id="answer"
              placeholder="type romaji…"
              autocomplete="off" autocorrect="off"
              autocapitalize="none" spellcheck="false"
            />
          </div>

          <div class="feedback" id="feedback" aria-live="polite"></div>

          <div class="btn-row" id="btn-check-row">
            <button class="btn btn-check" id="btn-check">Check</button>
            <button class="btn btn-skip hidden" id="btn-skip">Skip</button>
          </div>

          <button class="btn btn-next" id="btn-next">Next →</button>

          <div class="hint-row">
            <span class="kbd">press <span>Enter</span> to check / continue</span>
          </div>
        </div>

        <!-- ── Multiple Choice UI ── -->
        <div id="choice-ui" class="hidden">
          <div class="feedback" id="choice-feedback" aria-live="polite"></div>
          <div class="choice-grid" id="choice-grid"></div>
          <button class="btn btn-next choice-next hidden" id="choice-btn-next">Next →</button>
        </div>

      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
